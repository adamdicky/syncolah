<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <!-- Required meta tags -->
        <link rel="stylesheet" th:href="@{/css/signup.css}">

        <link href='https://fonts.googleapis.com/css?family=Inter' rel='stylesheet'>

        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>Login</title>

    </head>

    <body>
        <div class="navbar">
            <a>syncolah</a>
        </div>

        <div class="container">
            <a class="loginText">Sign Up</a>
            <div th:if="${success}">
                <strong>Account created succesfully!</strong>
                <a href="/login">Login</a>
                <button type="button"></button>
            </div>
            <div class="loginContainer">
                <form class="loginForm" method="post" th:object="${registerDTO}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <label>First Name</label>
                    <input type="text" th:field="${registerDTO.firstName}">
                    <p th:if="${#fields.hasErrors('firstName')}" th:errorclass="text-danger" th:errors="${registerDTO.firstName}"></p>
                    <br>

                    <label>Last Name</label>
                    <input type="text" th:field="${registerDTO.lastName}">
                    <p th:if="${#fields.hasErrors('lastName')}" th:errorclass="text-danger" th:errors="${registerDTO.lastName}"></p>
                    <br>

                    <label>Email</label>
                    <input type="text" th:field="${registerDTO.email}">
                    <p th:if="${#fields.hasErrors('email')}" th:errorclass="text-danger" th:errors="${registerDTO.email}"></p>
                    <br>

                    <label>Phone</label>
                    <input type="text" th:field="${registerDTO.phone}">
                    <p th:if="${#fields.hasErrors('phone')}" th:errorclass="text-danger" th:errors="${registerDTO.phone}"></p>
                    <br>

                    <label>Password</label>
                    <input type="password" th:field="${registerDTO.password}">
                    <p th:if="${#fields.hasErrors('password')}" th:errorclass="text-danger" th:errors="${registerDTO.password}"></p>
                    <br>

                    <label>Confirm Password</label>
                    <input type="password" th:field="${registerDTO.confirmPassword}">
                    <p th:if="${#fields.hasErrors('confirmPassword')}" th:errorclass="text-danger" th:errors="${registerDTO.confirmPassword}"></p>
                    <br>

        <!--            <label for="password">password</label>-->
        <!--            <input type="password" id="password" name="password">-->
        <!--            <br>-->
        <!--            <br>-->

                    <input type="submit" value="Sign Up">
                </form>
            </div>
        </div>

    </body>
</html>
