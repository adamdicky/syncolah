<!doctype html>
<html lang="en">
    <head>
        <!-- Required meta tags -->
        <link rel="stylesheet" href="/css/register.css">

        <link href='https://fonts.googleapis.com/css?family=Inter' rel='stylesheet'>

        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Bootstrap CSS -->

        <title>Register</title>
    </head>

    <body>
        <div class="navbar">
            <a>syncolah</a>
        </div>

        <div class="container">
            <a class="registerText">Register</a>
            <div class="registerContainer">
                <form id="REG" class="registerForm">

                    <div class="schoolInfo">
                        <a>School Information</a>
                        <label for="info"></label>
                        <input type="text" id="info" name="info" placeholder="School Name">

                        <label for="type"></label>
                        <input type="text" id="type" name="type" placeholder="School Type">
                    </div>

                    <div class="schoolAddress">
                        <a>Address</a>
                        <label for="address"></label>
                        <input type="text" id="address" name="address" placeholder="State, Area">

                        <label for="postcode"></label>
                        <input type="text" id="postcode" name="postcode" placeholder="Postal Code">

                        <label for="detail"></label>
                        <input type="text" id="detail" name="detail" placeholder="School Lot No, Building, Street Name">
                    </div>
<!--                    <label for="username">username</label>-->
<!--                    <input type="text" value="">-->
<!--                    <br>-->
<!--                    <label for="password">password</label>-->
<!--                    <input type="password" value="">-->
<!--                    <br>-->
<!--                    <br>-->
<!--                    <input type="button" value="Sign In">-->
                </form>
                <label for="register"></label>
                <input type="submit" form="REG" id="register" value="Register">
            </div>
        </div>
    </body>
</html>
